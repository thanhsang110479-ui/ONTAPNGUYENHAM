<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>ÔN TẬP PHƯƠNG TRÌNH MŨ - LOGARIT - TẠO BỞI MR SANG</title>

<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="question_bank_mulog.js"></script>

<style>
body{font-family:Arial;background:#0f172a;color:white;text-align:center}
.container{width:1000px;margin:auto}
.btn{padding:10px;margin:8px;width:420px;background:#1e293b;color:white;border:none;cursor:pointer}
.btn:hover{background:#334155}
.correct{background:green !important}
.wrong{background:red !important}
</style>
</head>

<body>
<div class="container">

<h1>ÔN TẬP PHƯƠNG TRÌNH MŨ - LOGARIT</h1>

<div id="startBox">
<input id="playerName" placeholder="Họ và tên"><br><br>
<button onclick="startGame()">Bắt đầu</button>
</div>

<div id="gameBox" style="display:none">
<div id="timer"></div>
<div id="question" style="font-size:22px;margin:20px 0"></div>
<div id="answers"></div>
</div>

<div id="resultBox" style="display:none"></div>

</div>

<audio id="introAudio" src="intro_mulog.mp3"></audio>

<script>

const TOTAL_TIME = 60;
const TOTAL_PER_GAME = 20;

let gameQuestions = [];
let current = 0;
let score = 0;
let timerInterval;
let timeLeft = TOTAL_TIME;

function shuffle(a){return a.sort(()=>Math.random()-0.5)}

function buildGame(){
  const g1 = shuffle(BANK.filter(q=>q.group===1)).slice(0,7);
  const g2 = shuffle(BANK.filter(q=>q.group===2)).slice(0,3);
  const g3 = shuffle(BANK.filter(q=>q.group===3)).slice(0,7);
  const g4 = shuffle(BANK.filter(q=>q.group===4)).slice(0,3);
  return shuffle([...g1,...g2,...g3,...g4]);
}

function startGame(){
  document.getElementById("startBox").style.display="none";
  document.getElementById("gameBox").style.display="block";
  document.getElementById("introAudio").play();
  gameQuestions = buildGame();
  showQuestion();
}

function showQuestion(){
  if(current>=TOTAL_PER_GAME){endGame();return;}

  timeLeft = TOTAL_TIME;
  updateTimer();
  timerInterval=setInterval(()=>{
    timeLeft--;
    updateTimer();
    if(timeLeft<=0){
      clearInterval(timerInterval);
      current++;
      showQuestion();
    }
  },1000);

  const q = gameQuestions[current];
  document.getElementById("question").innerHTML=q.q;
  const ansDiv=document.getElementById("answers");
  ansDiv.innerHTML="";
  ["A","B","C","D"].forEach(k=>{
    const btn=document.createElement("button");
    btn.className="btn";
    btn.innerHTML=k+". "+q[k];
    btn.onclick=()=>checkAnswer(btn,k);
    ansDiv.appendChild(btn);
  });
  MathJax.typeset();
}

function checkAnswer(btn,choice){
  clearInterval(timerInterval);
  if(choice===gameQuestions[current].correct){
    score++;
    btn.classList.add("correct");
  }else{
    btn.classList.add("wrong");
  }
  setTimeout(()=>{
    current++;
    showQuestion();
  },800);
}

function updateTimer(){
  document.getElementById("timer").innerText="Thời gian: "+timeLeft+" giây";
}

function endGame(){
  document.getElementById("gameBox").style.display="none";
  document.getElementById("resultBox").style.display="block";
  document.getElementById("resultBox").innerHTML="<h2>Kết quả: "+score+"/20</h2><br><button onclick='exportExcel()'>Xuất Excel</button>";
}

function exportExcel(){
  const data=[[ "Họ tên", document.getElementById("playerName").value ],
              [ "Điểm", score ]];
  const ws=XLSX.utils.aoa_to_sheet(data);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"KQ");
  const fn=`Ket_qua_on_tap_phuong_trinh_mu_logarit_${Date.now()}.xlsx`;
  XLSX.writeFile(wb,fn);
}

</script>

</body>
</html>
